<!DOCTYPE html>
<html>
<head>
  <title>Test Count</title>
  <script src="/__/firebase/10.9.0/firebase-app-compat.js"></script>
  <script src="/__/firebase/10.9.0/firebase-database-compat.js"></script>
</head>
<body>
  <h1>Count: <span id="count">Waiting...</span></h1>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAMIkdyvrdPWm-UnEhvxvzWwTNW8nj6OBM",
      projectId: "guestbook-3c7eb",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    db.useEmulator('localhost', 9000);

    db.ref('messages').on('value', snap => {
      document.getElementById('count').textContent = snap.numChildren();
      console.log('Got count:', snap.numChildren());
    }, err => {
      console.error('Error:', err);
    });
  </script>
</body>
</html>
