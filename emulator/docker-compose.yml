version: '3.8'

services:
  firebase-emulator:
    build: .
    ports:
      - "9000:9000" # Realtime Database
      - "9099:9099" # Authentication
      - "5005:5005" # Hosting
      - "4000:4000" # Emulator UI
    volumes:
      - ../:/app
    environment:
      - FIREBASE_PROJECT_ID=guestbook-3c7eb
