name: Deploy to Firebase

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUESTBOOK_3C7EB }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live

      - name: Authenticate for Firebase CLI
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUESTBOOK_3C7EB }}

      - name: Deploy Database Rules
        run: npx -y firebase-tools deploy --only database --project "${{ vars.FIREBASE_PROJECT_ID }}"
