name: Deploy to Firebase

on:
  push:
    branches: [production]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Firebase
        run: npx -y firebase-tools deploy --only hosting,database --token "$FIREBASE_TOKEN" --project guestbook-3c7eb
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
