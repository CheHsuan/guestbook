name: Deploy to Firebase

on:
  release:
    types: [published]

jobs:
  preview:
    name: Deploy Hosting to Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUESTBOOK_3C7EB }}

      - name: Deploy Hosting to Preview Channel
        run: npx -y firebase-tools hosting:channel:deploy preview-${{ github.event.release.tag_name }} --expires 1d

  live:
    name: Deploy Hosting and Database to Live
    runs-on: ubuntu-latest
    needs: [preview]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUESTBOOK_3C7EB }}

      - name: Deploy Hosting and Database Rules
        run: npx -y firebase-tools deploy --only hosting,database
